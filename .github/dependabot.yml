# Keep dependencies CURRENT, not just patched. Weekly version-update PRs for
# every ecosystem regardless of whether a CVE exists. minor + patch bumps are
# grouped per ecosystem to reduce noise; MAJOR bumps fall outside the groups so
# Dependabot raises them as individual PRs (each breaking-change reviewed on its
# own). Dependabot security updates come through immediately, regardless of
# schedule or cooldown.
#
# The only versions deliberately held back are two MAJOR bumps below
# (@types/node, ruby) — runtime-compatibility guards, NOT CVE gating. Lift them
# in lockstep when the corresponding runtime major actually moves.
#
# `cooldown` holds back version-update PRs until a release has aged past the
# given number of days — a supply-chain guard so we don't pull a version that
# was published moments ago (and might be yanked/flagged as compromised).
# Note: cooldown does NOT delay Dependabot security updates (CVE fixes) — those
# still come through immediately.
version: 2
updates:
  - package-ecosystem: bundler
    directory: /backend
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      backend-deps:
        patterns: ["*"]
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      frontend-deps:
        patterns: ["*"]
        update-types: [minor, patch]
    # @types/node must track the Node RUNTIME major, not the latest release. The
    # runtime is Node 22 (Dockerfile.dev `node:22-slim`); pulling @types/node 25.x
    # describes APIs that don't exist on 22, so code can typecheck yet crash at
    # runtime. Block major bumps; patch/minor within the line still come through.
    # Bump it deliberately in lockstep when the Node runtime major moves.
    ignore:
      - dependency-name: "@types/node"
        update-types: [version-update:semver-major]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7

  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    # The Ruby version is bumped deliberately and in lockstep across .ruby-version,
    # the production Dockerfile, CI, and Dockerfile.dev — never piecemeal. Dependabot
    # only sees Dockerfile.dev, so its bumps create a dev/prod version skew. Block
    # major bumps (e.g. 3.4 -> 4.0); patch/minor within the line still come through.
    ignore:
      - dependency-name: "ruby"
        update-types: [version-update:semver-major]
