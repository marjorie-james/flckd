name: CI (scripts)

# Shellcheck lint and bats behavioral tests for infra shell scripts.
#
# Required-check + minutes hygiene: `shellcheck` and `bats` are branch-protection
# required contexts, so they must report on EVERY pull request — a top-level
# `paths:` filter would skip the whole workflow on unrelated PRs and leave the
# required checks pending forever (merge deadlock). Instead a cheap `changes`
# detector decides whether the real work runs; the `shellcheck` / `bats` gate
# jobs always report, passing on unrelated PRs without doing the work.
on:
  pull_request:

concurrency:
  group: ci-scripts-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Cheap path detector — decides whether the heavy jobs need to run.
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      scripts: ${{ steps.filter.outputs.scripts }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: filter
        run: |
          base='${{ github.event.pull_request.base.sha }}'
          head='${{ github.event.pull_request.head.sha }}'
          if git diff --name-only "$base...$head" \
               | grep -qE '^(infra/scripts/|test/infra/|\.github/workflows/ci-scripts\.yml$)'; then
            echo "scripts=true" >> "$GITHUB_OUTPUT"
          else
            echo "scripts=false" >> "$GITHUB_OUTPUT"
          fi

  shellcheck-run:
    needs: changes
    if: needs.changes.outputs.scripts == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Shellcheck (infra/scripts)
        # SC1091: don't follow sourced files (infra/.region is gitignored,
        #         so it won't be present in CI — that's expected and fine).
        # SC2034: unused variable warnings — suppressed because REGION/REGION_LABEL
        #         are written into .region for downstream consumers.
        run: |
          shellcheck --severity=warning \
            --exclude=SC1091,SC2034 \
            infra/scripts/*.sh

  bats-run:
    needs: changes
    if: needs.changes.outputs.scripts == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Run bats tests (infra/scripts)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/code" \
            -w /code \
            bats/bats:1.11.0 \
            test/infra/build-geocoder.bats \
            test/infra/fetch-extract.bats \
            test/infra/setup.bats \
            test/infra/country-registry.bats \
            test/infra/state-registry.bats \
            test/infra/deploy-scope-env.bats \
            test/infra/deploy-scope-secrets.bats \
            test/infra/deploy-scope-cross-check.bats \
            test/infra/build-geo.bats \
            test/infra/lib-deploy-host.bats \
            test/infra/bootstrap-host.bats \
            test/infra/build-cameras.bats \
            test/infra/deploy-frontend.bats \
            test/infra/geo-manifest.bats \
            test/infra/provision-geo-host.bats \
            test/infra/teardown.bats

  # Required branch-protection context. Always runs; passes unless the real
  # shellcheck job failed.
  shellcheck:
    needs: [changes, shellcheck-run]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Gate on shellcheck-run result
        run: |
          changes='${{ needs.changes.result }}'
          result='${{ needs.shellcheck-run.result }}'
          echo "changes=${changes} shellcheck-run=${result}"
          if [ "${changes}" != "success" ]; then
            echo "path detection did not succeed"; exit 1
          fi
          if [ "${result}" = "failure" ] || [ "${result}" = "cancelled" ]; then
            exit 1
          fi
          exit 0

  # Required branch-protection context. Always runs; passes unless the real
  # bats job failed.
  bats:
    needs: [changes, bats-run]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Gate on bats-run result
        run: |
          changes='${{ needs.changes.result }}'
          result='${{ needs.bats-run.result }}'
          echo "changes=${changes} bats-run=${result}"
          if [ "${changes}" != "success" ]; then
            echo "path detection did not succeed"; exit 1
          fi
          if [ "${result}" = "failure" ] || [ "${result}" = "cancelled" ]; then
            exit 1
          fi
          exit 0
