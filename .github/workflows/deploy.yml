name: Deploy

# Manual-dispatch deploy via Kamal 2. By design this NEVER auto-deploys on
# merge/push to main — production deploys are deliberate, gated by a typed
# confirmation and the `production` environment. Do NOT add a `push` trigger here:
# a merge to main must not ship to prod on its own.
#
# Required GitHub config before this can run:
#   Secrets: KAMAL_REGISTRY_USERNAME, KAMAL_REGISTRY_PASSWORD, RAILS_MASTER_KEY,
#            SECRET_KEY_BASE, DATABASE_PASSWORD, POSTGRES_PASSWORD,
#            NOMINATIM_PASSWORD, SSH_PRIVATE_KEY
#   Variables (consumed by bin/render-deploy-yml, which rebuilds the gitignored
#            config/deploy.yml in CI — every one is required or render aborts):
#            REGISTRY_HOST, REGISTRY_NAMESPACE, API_DOMAIN, WEB_HOST, JOB_HOST,
#            DB_HOST, ROUTING_HOST, GEOCODER_HOST, TILES_HOST

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm a production deploy'
        required: true
        default: ""

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ inputs.confirm == 'deploy' }}
    runs-on: ubuntu-latest
    environment: production # add required reviewers in repo settings for a gate
    defaults:
      run:
        working-directory: backend
    env:
      KAMAL_REGISTRY_PASSWORD: ${{ secrets.KAMAL_REGISTRY_PASSWORD }}
      RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
      DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      NOMINATIM_PASSWORD: ${{ secrets.NOMINATIM_PASSWORD }}
    steps:
      - uses: actions/checkout@v7
      - uses: ruby/setup-ruby@v1.314.0
        with:
          ruby-version: "3.4.9"
          bundler-cache: true
          working-directory: backend
      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Render deploy.yml from template
        # config/deploy.yml is gitignored (no real hosts in git), so rebuild it
        # from the tracked template using GitHub Actions variables.
        env:
          REGISTRY_HOST: ${{ vars.REGISTRY_HOST }}
          REGISTRY_NAMESPACE: ${{ vars.REGISTRY_NAMESPACE }}
          API_DOMAIN: ${{ vars.API_DOMAIN }}
          WEB_HOST: ${{ vars.WEB_HOST }}
          JOB_HOST: ${{ vars.JOB_HOST }}
          DB_HOST: ${{ vars.DB_HOST }}
          ROUTING_HOST: ${{ vars.ROUTING_HOST }}
          GEOCODER_HOST: ${{ vars.GEOCODER_HOST }}
          TILES_HOST: ${{ vars.TILES_HOST }}
        run: bin/render-deploy-yml
      - name: Install Kamal
        run: gem install kamal -v "~> 2.0"
      - name: Deploy (Kamal)
        run: kamal deploy
      - name: Smoke test (health endpoint)
        # Fail the deploy if the app doesn't report healthy after rollout.
        run: |
          for i in $(seq 1 10); do
            code=$(curl -s -o /dev/null -w '%{http_code}' "https://${{ vars.API_DOMAIN }}/api/v1/health" || true)
            echo "attempt $i: HTTP $code"
            [ "$code" = "200" ] && exit 0
            sleep 6
          done
          echo "health check never returned 200" >&2
          exit 1
